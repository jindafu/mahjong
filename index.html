<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta charset="UTF-8">
    <title>жқҫйҳійә»е°Ҷ</title>
    <style>
        :root { --soul-gold: #ceb07e; --jade-green: #1a3c34; --tile-w: 30px; --tile-h: 42px; --win-red: #ff4d4d; --draw-blue: #4a90e2; }
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; background: radial-gradient(circle, #2d5a4c 0%, #1a3c34 100%); overflow: hidden; font-family: "STKaiti", "Microsoft YaHei", serif; }
        .player-container { position: absolute; display: flex; align-items: flex-end; justify-content: center; }
        
        #area-0 { bottom: 25px; left: 50%; transform: translateX(-50%); z-index: 1000; }
        #area-2 { top: 25px; left: 50%; transform: translateX(-50%) rotate(180deg); }
        #area-1 { right: 30px; top: 50%; transform: translateY(-50%) rotate(-90deg); }
        #area-3 { left: 30px; top: 50%; transform: translateY(-50%) rotate(90deg); }

        .tile { width: 50px; height: 68px; background: #fffdf5; border-radius: 6px; display: flex; justify-content: center; align-items: center; font-size: 2rem; position: relative; box-shadow: 0 4px 0 #ccc; border: 1.5px solid #ddd; cursor: pointer; font-family: "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", "STKaiti", serif;
		color: #2d5a4c; /* и®ҫзҪ®дёҖдёӘеҹәзЎҖж·ұз»ҝиүІ */
		text-shadow: 0.5px 0.5px 0px #000; /* еўһеҠ иҪ®е»“ж„ҹ */
		}
        .tile.tile-sm { width: var(--tile-w); height: var(--tile-h); font-size: 1.2rem; cursor: default; box-shadow: 0 2px 0 #bbb; }
        .is-flipped { background: linear-gradient(135deg, #2a5040, #1a3c34) !important; color: transparent !important; border: 1px solid #1a3026 !important; box-shadow: inset 0 0 5px rgba(0,0,0,0.5), 0 2px 0 #111 !important; }
        .is-last-draw { margin-left: 25px !important; border: 3px solid var(--draw-blue) !important; box-shadow: 0 0 20px var(--draw-blue) !important; transform: translateY(-12px); }
        .global-last-discard { border: 2.5px solid var(--win-red) !important; box-shadow: 0 0 15px var(--win-red) !important; }
        .is-bao { background: #fffde7 !important; border-color: var(--soul-gold) !important; }
        .is-bao::after { content: 'иҙў'; position: absolute; top: 0; left: 0; background: var(--soul-gold); color: #630; font-size: 10px; padding: 1px 2px; font-weight: bold; border-radius: 0 0 4px 0; }
        
        .river { position: absolute; display: grid; grid-template-columns: repeat(6, var(--tile-w)); gap: 5px; z-index: 50; }
        .r-bottom { bottom: 195px; left: 50%; transform: translateX(-50%); }
        .r-top { top: 135px; left: 50%; transform: translateX(-50%) rotate(180deg); }
        .r-right { right: 30%; top: 50%; transform: translate(50%, -50%) rotate(-90deg); }
        .r-left { left: 30%; top: 50%; transform: translate(-50%, -50%) rotate(90deg); }

        #action-panel { display:none; position:absolute; bottom:230px; left:50%; transform:translateX(-50%); z-index:2000; text-align:center; min-width: 450px; }
        .action-btn { padding: 12px 35px; border-radius: 50px; color: white; border: 2px solid var(--soul-gold); cursor: pointer; font-weight: bold; font-size: 20px; background: rgba(26, 60, 52, 0.95); margin: 0 10px; }
        .btn-hu { background: #d63031 !important; border-color: #ff7675 !important; }

        #result-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
        .res-card { background: var(--jade-green); padding: 30px; border-radius: 20px; border: 3px solid var(--soul-gold); text-align: center; color: white; width: 850px; }
        .res-row { display: flex; justify-content: center; align-items: center; gap: 12px; margin: 15px 0; flex-wrap: wrap; }
        .res-meld-group { display: flex; gap: 4px; padding: 8px; background: rgba(0,0,0,0.3); border-radius: 4px; }
		
		/* еҹәзЎҖж ·ејҸпјҡеўһеҠ еұӮзә§е№¶и°ғж•ҙдҪҚзҪ® */
		.info-box { 
			position: fixed; 
			top: env(safe-area-inset-top, 20px); /* йҖӮй…ҚжүӢжңәзҒөеҠЁеІӣ/еҲҳжө·еұҸ */
			left: 10px; 
			z-index: 9999; /* зЎ®дҝқеңЁжңҖдёҠеұӮ */
			background: rgba(0,0,0,0.85); 
			padding: 8px; 
			border-radius: 8px; 
			border: 2px solid var(--soul-gold); 
			color: white; 
			text-align: center;
			box-shadow: 0 4px 10px rgba(0,0,0,0.5);
		}
		
		/* й’ҲеҜ№жүӢжңәз«ҜжүҒе№іеұҸе№•зҡ„дё“йЎ№йҖӮй…Қ */
		@media screen and (max-width: 950px) and (orientation: landscape) {
			/* ж ёеҝғпјҡеҝ…йЎ»е…Ғи®ёжәўеҮәпјҢеҗҰеҲҷйҳҙеҪұе’Ңиҫ№жЎҶдјҡиў«иЈҒеҲҮ */
			.river, .player-container, { overflow: visible !important;display: grid !important; }
			/* 1. и“қжЎҶпјҡеҪ“еүҚиҪ®еҲ°зҡ„зҺ©е®¶еҢәеҹҹй«ҳдә® */
    .active-player {
        background: rgba(74, 144, 226, 0.1) !important;
        border-radius: 10px;
    }

    /* и“қжЎҶеҶ…йӮЈеј ж–°зүҢпјҡзҷҪиүІеә•иүІ + и“қиҫ№ */
    .active-player .is-last-draw {
        background-color: #ffffff !important;
        border: 2px solid #4a90e2 !important;
        box-shadow: 0 0 8px #4a90e2 !important;
    }

    /* 4. зәўжЎҶпјҡжңҖеҗҺеҮәзҡ„дёҖеј зүҢ дјҳеҢ–зүҲ */
.global-last-discard {
    position: relative !important;
    z-index: 2000 !important;
    background-color: #fff !important;
    /* еҸ–ж¶Ҳ outlineпјҢж”№з”ЁеҶ…иҫ№жЎҶйўңиүІ */
    border: 1px solid #ff4d4d !important;
    /* еўһеҠ зәўиүІе‘јеҗёж„ҹзҡ„еӨ–еҸ‘е…ү */
    box-shadow: 0 0 0 2px rgba(255, 77, 77, 0.4), 0 0 10px rgba(255, 77, 77, 0.6) !important;
}

/* дҪҝз”ЁдјӘе…ғзҙ еҲ¶йҖ дёҖдёӘзЁҚеҫ®еӨ§дёҖеңҲзҡ„зәўжЎҶпјҢиҫҫеҲ°еӣҫзүҮдёӯйӮЈз§Қз•Ҙеҫ®еҢ…иЈ№зҡ„ж•Ҳжһң */
.global-last-discard::before {
    content: "";
    position: absolute;
    top: -4px;
    left: -4px;
    right: -4px;
    bottom: -4px;
    border: 2px solid #ff4d4d;
    border-radius: 8px; /* еҢ№й…ҚзүҢзҡ„еңҶи§’ */
    pointer-events: none; /* зЎ®дҝқдёҚеҪұе“ҚзӮ№еҮ» */
    animation: blink-red 1.5s infinite ease-in-out;
}

@keyframes blink-red {
    0% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(1.05); }
    100% { opacity: 1; transform: scale(1); }
}
			/* 1. ж•ҙдҪ“зј©е°ҸжүҖжңүзүҢ */
			.tile { 
				width: 32px !important;    /* еҺҹжқҘ50pxпјҢжүӢжңәз«ҜеҮҸе°ҸеҲ°32px */
				height: 44px !important; 
				font-size: 1.8rem !important; 
				font-family: "Apple Color Emoji", sans-serif !important;
				box-shadow: 0 2px 0 #ccc !important;
				border: 1px solid #ddd !important;
			}
			
			/* 2. зүҢжІізүҢиҝӣдёҖжӯҘзј©е°Ҹ */
			.tile.tile-sm { 
				width: 22px !important; 
				height: 30px !important; 
				font-size: 1.1rem !important; 
			}

			/* 3. дҝ®жӯЈе®ҡдҪҚпјҡжҠҠжүӢзүҢеҺӢеҲ°еә•йғЁпјҢз»ҷзүҢжІіз•ҷдҪҚзҪ® */
			#area-0 { bottom: 0px !important; }
			#area-2 { top: 0px !important; }
			/* 3. е·ҰеҸідёӨе®¶пјҲ1еҸ·е’Ң3еҸ·пјүжүӢзүҢеҫҖдёӨдҫ§жҢӘпјҢйҳІжӯўжҢЎдҪҸдёӯй—ҙ */
			#area-1 { right: -60px !important; scale: 0.8; }
			#area-3 { left: -60px !important; scale: 0.8; }
			
			/* 1. ејәеҲ¶зј©е°ҸзүҢжІіпјҢи…ҫеҮәдёӯй—ҙз©әең° */
			.river { 
				grid-template-columns: repeat(6, 18px) !important; /* иҝӣдёҖжӯҘзј©е°ҸзүҢжІіеҚ•еј е®ҪеәҰ */
				gap: 1px !important; 
			}
			/* еҸідҫ§зүҢжІіпјҡеҺҹжқҘжҳҜ right: 30%пјҢж”№дёәжӣҙйқ еҸі */
			.r-right { 
				right: 25% !important; /* еҗ‘еҸідҫ§жҺЁпјҢз»ҷдёӯеҝғз•ҷзҷҪ */
				top: 50% !important;
			}

			/* е·Ұдҫ§зүҢжІіпјҡеҺҹжқҘжҳҜ left: 30%пјҢж”№дёәжӣҙйқ е·Ұ */
			.r-left { 
				left: 25% !important; /* еҗ‘е·Ұдҫ§жҺЁпјҢз»ҷдёӯеҝғз•ҷзҷҪ */
				top: 50% !important;
			}
			.r-bottom { bottom: 85px !important; } /* зүҢжІідёӢиҫ№з•ҢдёӢз§»пјҢи…ҫеҮәз©әй—ҙз»ҷдёҠж–№ */
			.r-top { top: 55px !important; }

			/* 5. йҖүдёӯи“қжЎҶйҖ»иҫ‘дҝ®жӯЈ */
			.tile.selected {
				transform: translateY(-6px) !important;
				border: 2px solid #007bff !important;
			}

			/* 6. ж“ҚдҪңжҢүй’®е’ҢUIдҝЎжҒҜжЎҶ */
			#action-panel { 
				bottom: 90px !important; 
				transform: translateX(-50%) scale(0.6) !important; 
			}
			.info-box { 
				top: 2px !important; left: 15px !important;
				transform: scale(0.7) !important;
				transform-origin: left top;
				display: flex !important; align-items: center; gap: 5px;
			}
			#bao-display {
				font-size: 1.7rem !important;
				margin-bottom: 0 !important; /* еҸ–ж¶Ҳеә•йғЁй—ҙи·қ */
				width: 32px !important;
				height: 44px !important;
			}

			/* иҙўзҘһж Үеҝ—дҝ®жӯЈ */
			.tile::after {
				font-size: 0.5rem !important;
				padding: 0 1px !important;
				right: 0px !important;
			}
		}
    </style>
</head>
<body>
<div id="game-stage">
    <div class="info-box" style="position:fixed; top:20px; left:20px; z-index:200; background:rgba(0,0,0,0.6); padding:15px; border-radius:8px; border:1px solid var(--soul-gold); color:white; text-align:center;">
        <div id="bao-display" class="tile tile-sm is-bao" style="margin:0 auto 10px">?</div>
        <div>еү©дҪҷзүҢ: <span id="deck-count">0</span></div>
    </div>
    <div id="river-0" class="river r-bottom"></div><div id="river-1" class="river r-right"></div>
    <div id="river-2" class="river r-top"></div><div id="river-3" class="river r-left"></div>
    <div id="area-0" class="player-container"><div id="melds-0" style="display:flex;gap:12px;margin-right:20px;"></div><div id="hand-0" style="display:flex;"></div></div>
    <div id="area-1" class="player-container"><div id="melds-1" style="display:flex;gap:12px;margin-right:20px;"></div><div id="hand-1" style="display:flex;"></div></div>
    <div id="area-2" class="player-container"><div id="melds-2" style="display:flex;gap:12px;margin-right:20px;"></div><div id="hand-2" style="display:flex;"></div></div>
    <div id="area-3" class="player-container"><div id="melds-3" style="display:flex;gap:12px;margin-right:20px;"></div><div id="hand-3" style="display:flex;"></div></div>
    <div id="action-panel"></div>
    <div id="result-screen">
        <div class="res-card">
            <h1 id="res-title" style="color:var(--soul-gold); font-size: 2.5rem; margin:0;"></h1>
            <div id="res-melds" class="res-row"></div>
            <div id="res-hand" class="res-row"></div>
            <div id="res-yaku-list" style="margin:15px 0; font-size:1.2rem; display: flex; justify-content: center; gap: 20px; color: #fff;"></div>
            <div style="font-size: 3.5rem; color:var(--soul-gold); font-weight:bold;"><span id="res-total">0</span> з•Ә</div>
            <button class="action-btn" onclick="init()" style="margin-top:20px; width:60%">ж–°еҜ№еұҖ</button>
        </div>
    </div>
</div>

<script>
const ICONS = {
    'm':['рҹҖҮ','рҹҖҲ','рҹҖү','рҹҖҠ','рҹҖӢ','рҹҖҢ','рҹҖҚ','рҹҖҺ','рҹҖҸ'],
    's':['рҹҖҗ','рҹҖ‘','рҹҖ’','рҹҖ“','рҹҖ”','рҹҖ•','рҹҖ–','рҹҖ—','рҹҖҳ'],
    'p':['рҹҖҷ','рҹҖҡ','рҹҖӣ','рҹҖң','рҹҖқ','рҹҖһ','рҹҖҹ','рҹҖ ','рҹҖЎ'],
    'z':['рҹҖҖ','рҹҖҒ','рҹҖӮ','рҹҖғ','рҹҖ„','рҹҖ…','рҹҖҶ']
};
let game = { deck: [], bao: '', hands:[[],[],[],[]], melds:[[],[],[],[]], rivers:[[],[],[],[]], turn:0, winner:-1, lastPlayer:-1, lastTile:null, isTrueDraw:false, isGangState:false };

function createTileDOM(t, isSmall, isBao, isFlip) {
    const d = document.createElement('div');
    d.className = `tile ${isSmall?'tile-sm':''} ${isBao?'is-bao':''} ${isFlip?'is-flipped':''}`;
    
    if(!isFlip) {
        const val = parseInt(t[0]);
        const type = t[1];
        d.innerText = ICONS[type][val-1];

        // йўңиүІзқҖиүІйҖ»иҫ‘
        if (type === 'm') d.style.color = '#e43333'; // дёҮеӯ—пјҡзәўиүІ
        if (type === 's') d.style.color = '#27ae60'; // жқЎеӯҗпјҡз»ҝиүІ
        if (type === 'p') d.style.color = '#2980b9'; // зӯ’еӯҗпјҡи“қиүІ
        if (type === 'z') {
            if (val <= 4) d.style.color = '#2c3e50'; // йЈҺзүҢпјҡж·ұзҒ°иүІ
            if (val === 5) d.style.color = '#e74c3c'; // дёӯпјҡйІңзәў
            if (val === 6) d.style.color = '#2ecc71'; // еҸ‘пјҡзҝ з»ҝ
            if (val === 7) d.style.color = '#3498db'; // зҷҪпјҡеӨ©и“қ
        }
        // еўһеҠ ж–Үеӯ—йҳҙеҪұи®©еӣҫж Үжӣҙз«ӢдҪ“
        d.style.textShadow = "1px 1px 0px rgba(0,0,0,0.2)";
    }
    return d;
}

function createMeldGroup(m, reveal = false) {
    const group = document.createElement('div');
    group.className = 'res-meld-group';
    m.tiles.forEach((t, idx) => {
        let isFlip = false;
        if (m.type === 'PONG' || m.type === 'GANG') {
            if (m.fromRel === 0 && idx === 0) isFlip = true;
            if (m.fromRel === 1 && idx === 1) isFlip = true;
            if (m.fromRel === 2 && idx === 2) isFlip = true;
        } else if (m.type === 'ANGANG' && !reveal) {
            if (idx === 1 || idx === 2) isFlip = true;
        }
        group.appendChild(createTileDOM(t, true, t===game.bao, isFlip));
    });
    return group;
}

function sortHand(hand) {
    const order = {'m':0, 's':1, 'p':2, 'z':3};
    return hand.sort((a, b) => {
        if(a === game.bao) return -1; if(b === game.bao) return 1;
        if(a[1] !== b[1]) return order[a[1]] - order[b[1]];
        return parseInt(a[0]) - parseInt(b[0]);
    });
}

function render(reveal = false) {
    document.getElementById('deck-count').innerText = Math.max(0, game.deck.length - 20);
    for(let i=0; i<4; i++) {
        // --- ж ёеҝғдҝ®еӨҚпјҡз»ҷеҪ“еүҚзҺ©е®¶еҢәеҹҹж·»еҠ и“қжЎҶзұ»еҗҚ ---
        const area = document.getElementById(`area-${i}`);
        if (game.turn === i && game.winner === -1) {
            area.classList.add('active-player');
        } else {
            area.classList.remove('active-player');
        }

        const hEl = document.getElementById(`hand-${i}`); hEl.innerHTML = '';
        game.hands[i].forEach((t, idx) => {
            const isSelf = (i === 0), show = isSelf || reveal;
            const d = createTileDOM(t, !isSelf, (show && t===game.bao), !show);
            if(isSelf && game.isTrueDraw && idx === game.hands[0].length-1) d.classList.add('is-last-draw');
            if(isSelf && game.winner === -1 && game.turn === 0) d.onclick = () => discard(idx);
            hEl.appendChild(d);
        });

        const rEl = document.getElementById(`river-${i}`); rEl.innerHTML = '';
        game.rivers[i].forEach((t, idx) => {
            const isLast = (i === game.lastPlayer && idx === game.rivers[i].length - 1);
            const d = createTileDOM(t, true, t===game.bao, false);
            // еҜ№еә”дҪ д»Јз ҒйҮҢзҡ„зәўжЎҶзұ»еҗҚ
            if(isLast) d.classList.add('global-last-discard');
            rEl.appendChild(d);
        });
        const mEl = document.getElementById(`melds-${i}`); mEl.innerHTML = '';
        game.melds[i].forEach(m => mEl.appendChild(createMeldGroup(m, reveal)));
    }
}

function discard(idx) {
    document.getElementById('action-panel').style.display = 'none';
    game.isGangState = false; 
	game.consecutiveGangCount = 0; // еҮәзүҢдәҶиҜҙжҳҺиҝһжқ дёӯж–ӯпјҢйҮҚзҪ®
    
    let hand = game.hands[0];
    let t = hand[idx];

    // йҖ»иҫ‘еҲӨе®ҡпјҡеҰӮжһңжҳҜиҙўзҘһ
    if (t === game.bao) {
        // еҲӨе®ҡжҳҜеҗҰз¬ҰеҗҲвҖңйЈҳиҙўвҖқпјҡеҝ…йЎ»жҳҜзҲҶеӨҙеҗ¬зүҢзҠ¶жҖҒжү“еҮәиҙўзҘһ
        const checkRes = calculateYaku(hand, game.melds[0], game.isGangState);
        if (checkRes.total > 0 && checkRes.list.some(x => x.name.includes("иҙўзҘһеӨҙ"))) {
            game.piaoCounts[0]++; // иҝһйЈҳеұӮж•°еўһеҠ 
        }
        // и§„еҲҷ3пјҡеҸӘиҰҒжү“еҮәиҙўзҘһпјҢж— и®әжҳҜеҗҰеҗ¬зүҢпјҢжң¬иҪ®ејәеҲ¶й”Ғе®ҡдёүе®¶
        game.isActionLockedByPiao = true;
    } else {
        // и§„еҲҷ2пјҡеҰӮжһңжү“еҮәзҡ„дёҚжҳҜиҙўзҘһпјҢз«ӢеҚіи§ЈйҷӨиҮӘе·ұзҡ„йЈҳиҙўеҲӨе®ҡе’Ңе…ЁеұҖй”Ғе®ҡ
        game.piaoCounts[0] = 0;
        game.isActionLockedByPiao = false;
    }

    // жү§иЎҢеҮәзүҢ
    hand.splice(idx, 1);
    game.isTrueDraw = false; game.rivers[0].push(t); game.lastPlayer = 0; game.lastTile = t;
    sortHand(game.hands[0]); render();
    processDiscards(t, 0);
}

// --- зІҫеҮҶдҝ®ж”№ processDiscards еҮҪж•° ---
function processDiscards(tile, fromIdx) {
    let requests = [];
    for(let i=0; i<4; i++) {
        if(i === fromIdx) continue;
        let acts = [];
        
        // --- ж ёеҝғжӢҰжҲӘпјҡеҰӮжһңе…ЁеұҖй”Ғе®ҡејҖеҗҜпјҢи·іиҝҮеҗғзў°жқ еҲӨе®ҡ ---
        if (!game.isActionLockedByPiao) {
            let count = game.hands[i].filter(x => x === tile && x !== game.bao).length;
            if(count === 3) acts.push('GANG');
            if(count >= 2) acts.push('PONG');
            if((fromIdx + 1) % 4 === i) {
                let sets = checkChiOptions(i, tile);
                if(sets.length > 0) acts.push('CHI');
            }
        }
        
        // е…Ғи®ёжҲӘиғЎпјҲеҰӮжһңи§„еҲҷе…Ғи®ёиҙўзҘһиў«иғЎпјҢеҗҰеҲҷиҝҷйҮҢд№ҹдјҡиў« isActionLockedByPiao иҝҮж»Өпјү
        // if(checkCanHu(i, tile)) acts.push('HU'); 

        if(acts.length > 0) requests.push({pIdx: i, acts: acts});
    }
    if(requests.length === 0) nextTurn((fromIdx + 1) % 4);
    else handlePrioritizedRequests(requests, tile, fromIdx);
}

// --- дҝ®ж”№ handlePrioritizedRequests дёӯеҫӘзҺҜ AI еӨ„зҗҶзҡ„йғЁеҲҶ ---
function handlePrioritizedRequests(requests, tile, fromIdx) {
    // 1. е®ҡд№үдјҳе…Ҳзә§пјҡзў°/жқ дёә 2пјҢеҗғдёә 1
    const getScore = (req) => (req.acts.includes('GANG') || req.acts.includes('PONG')) ? 2 : 1;
    
    // 2. е°ҶжүҖжңүиҜ·жұӮжҢү дјҳе…Ҳзә§йҷҚеәҸ + еә§дҪҚйЎәеәҸ жҺ’еәҸ
    // (pIdx - fromIdx + 4) % 4 зЎ®дҝқд»ҺеҮәзүҢдәәзҡ„дёӢе®¶ејҖе§ӢжҢүйЎәж—¶й’ҲиҪ®иҜў
    requests.sort((a, b) => {
        let scoreA = getScore(a);
        let scoreB = getScore(b);
        if (scoreA !== scoreB) return scoreB - scoreA;
        return ((a.pIdx - fromIdx + 4) % 4) - ((b.pIdx - fromIdx + 4) % 4);
    });

    // 3. йҖ’еҪ’еӨ„зҗҶиҜ·жұӮпјҢзЎ®дҝқеүҚйқўзҡ„вҖңиҝҮвҖқдәҶжүҚй—®дёӢдёҖдёӘ
    function trigger(index) {
        if (index >= requests.length) {
            nextTurn((fromIdx + 1) % 4);
            return;
        }

        let req = requests[index];
        if (req.pIdx === 0) {
            // зҺ©е®¶иҜ·жұӮпјҡеј№еҮәйқўжқҝпјҢзӮ№вҖңиҝҮвҖқеҲҷз»§з»ӯдёӢдёҖдёӘиҜ·жұӮ
            showActions(req.acts, tile, fromIdx, (decision) => {
                if (decision === 'PASS') trigger(index + 1);
                else handleAction(decision, 0, tile, fromIdx);
            });
        } else {
            // AI иҜ·жұӮпјҡдҝқз•ҷжӮЁзҡ„еҸҚеҢ…йЈҺйҷ©е’Ңзӯ–з•ҘйҖ»иҫ‘
            let pIdx = req.pIdx;
            let currentMeldCount = game.melds[pIdx].filter(m => {
                let sourceIdx = (pIdx + [3, 2, 1][m.fromRel]) % 4;
                return sourceIdx === fromIdx;
            }).length;

            let shouldSkip = false;
            if (currentMeldCount === 2) {
				// йҡҸжңәзӯ–з•Ҙпјҡ0дёәжҝҖиҝӣ(ж— и§Ҷ)пјҢ1дёәдҝқе®Ҳ
                let strategy = Math.floor(Math.random() * 2); 
                if (strategy === 1) {// дҝқе®Ҳзӯ–з•Ҙ
					// жЁЎжӢҹпјҡеҰӮжһңжҲ‘еҗғдәҶиҝҷзүҢпјҢжүӢзүҢиғҪеҗҰеҗ¬зүҢ/иғЎзүҢпјҹ
					// з®ҖеҚ•йҖ»иҫ‘пјҡеҰӮжһңжҳҜжқ жҲ–зў°пјҢз§»йҷӨжүӢзүҢеҜ№еә”зүҢпјӣеҰӮжһңжҳҜеҗғпјҢз§»йҷӨеҜ№еә”дёӨеј 
					// жӯӨеӨ„з®ҖеҢ–еҲӨе®ҡпјҡеҰӮжһңеҗғ/зў°еҗҺпјҢжүӢзүҢеү©дҪҷзүҢ+1еј иҙўзҘһиғҪиҫҫеҲ°еҗ¬зүҢжҲ–иғЎзүҢзҠ¶жҖҒ
                    let mockHand = [...game.hands[pIdx]];
                    if (req.acts[0] === 'GANG' || req.acts[0] === 'PONG') {
                        mockHand = mockHand.filter(x => x !== tile);
                    }
					// еҲӨе®ҡпјҡеҰӮжһңиҝҷдёҖжӯҘиө°дәҶпјҢиғҪдёҚиғҪиғЎпјҹпјҲи°ғз”Ё checkBasicHu йў„еҲӨпјү
					// еӣ дёәеүҜйңІеҗҺжүӢзүҢеҸҳзҹӯпјҢиҝҷйҮҢж ЎйӘҢеү©дҪҷзүҢжҳҜеҗҰжҺҘиҝ‘жҲҗеһӢ
                    let bs = mockHand.filter(x => x === game.bao).length;
                    let others = mockHand.filter(x => x !== game.bao);
					// дҝқе®Ҳйў„еҲӨпјҡйҷӨйқһиҝҷдёҖжүӢдёӢеҺ»зӣҙжҺҘиғҪиғЎпјҢжҲ–иҖ…иҙўзҘһеӨҡпјҢеҗҰеҲҷж”ҫејғ
                    if (!checkBasicHu(others, bs) && bs < 2) shouldSkip = true;
                }
            }

            if (shouldSkip) {
                trigger(index + 1);
            } else {
                setTimeout(() => {
                    let act = req.acts[0];
                    if (act === 'CHI') {
                        let sets = checkChiOptions(pIdx, tile);
                        handleAction({type: 'CHI', set: sets[0]}, pIdx, tile, fromIdx);
                    } else {
                        handleAction(act, pIdx, tile, fromIdx);
                    }
                }, 400);
            }
        }
    }

    trigger(0); // ејҖе§ӢиҪ®иҜў
}

function checkChiPhase(requests, tile, fromIdx) {
    let chiReqs = requests.filter(r => r.acts.includes('CHI'));
    let pChi = chiReqs.find(r => r.pIdx === 0);
    if (pChi) {
        showActions(['CHI'], tile, fromIdx, (d) => {
            if(d === 'PASS') nextTurn((fromIdx + 1) % 4);
            else handleAction(d, 0, tile, fromIdx);
        });
    } else if (chiReqs.length > 0) {
        executeAIAction(chiReqs[0], tile, fromIdx);
    } else {
        nextTurn((fromIdx + 1) % 4);
    }
}

function executeAIAction(req, tile, fromIdx) {
    setTimeout(() => {
        if (req.acts.includes('GANG')) handleAction('GANG', req.pIdx, tile, fromIdx);
        else if (req.acts.includes('PONG')) handleAction('PONG', req.pIdx, tile, fromIdx);
        else if (req.acts.includes('CHI')) {
            let sets = checkChiOptions(req.pIdx, tile);
            handleAction({type: 'CHI', set: sets[0]}, req.pIdx, tile, fromIdx);
        }
    }, 400);
}

function showActions(acts, tile, fromIdx, callback) {
    let p = document.getElementById('action-panel');
    p.innerHTML = ''; p.style.display = 'block';
    acts.forEach(act => {
        let b = document.createElement('button'); b.className = 'action-btn ' + (act === 'HU' ? 'btn-hu' : '');
        b.innerText = act==='CHI'?'еҗғ':(act==='PONG'?'зў°':(act==='GANG'?'жқ ':'иғЎ'));
        b.onclick = () => {
            if (act === 'CHI') {
                let sets = checkChiOptions(0, tile);
                if (sets.length === 1) { p.style.display='none'; callback({type:'CHI', set:sets[0]}); }
                else renderChiOptions(sets, tile, fromIdx, callback);
            } else { p.style.display='none'; callback(act); }
        };
        p.appendChild(b);
    });
    let pass = document.createElement('button'); pass.className = 'action-btn'; pass.innerText = 'иҝҮ';
    pass.onclick = () => { p.style.display='none'; callback('PASS'); };
    p.appendChild(pass);
}

function renderChiOptions(sets, tile, fromIdx, callback) {
    let p = document.getElementById('action-panel'); p.innerHTML = '';
    sets.forEach(set => {
        let b = document.createElement('button'); b.className = 'action-btn';
        b.innerText = set.map(t => ICONS[t[1]][parseInt(t[0])-1]).join('');
        b.onclick = () => { p.style.display='none'; callback({type:'CHI', set:set}); };
        p.appendChild(b);
    });
}

function handleAction(decision, pIdx, tile, fromIdx) {
    let type = typeof decision === 'string' ? decision : decision.type;
	// еҰӮжһңиҝӣиЎҢзҡ„дёҚжҳҜжқ ж“ҚдҪңпјҢдё”д№ҹдёҚжҳҜиғЎзүҢз»“з®—пјҢиҜҙжҳҺиҝһжқ дёӯж–ӯ
    if (type !== 'GANG' && type !== 'HU') {
        game.consecutiveGangCount = 0;
    }
    let h = game.hands[pIdx];
    if (type === 'HU') { handleWin(pIdx); return; }
    
    let rel = -1;
    if (fromIdx !== -1) {
        let diff = (fromIdx + 4 - pIdx) % 4;
        if (diff === 3) rel = 0; else if (diff === 2) rel = 1; else if (diff === 1) rel = 2;
    }

    if (type === 'PONG') {
        h.splice(h.indexOf(tile), 1); 
        h.splice(h.indexOf(tile), 1);
        game.melds[pIdx].push({ type: 'PONG', tiles: [tile, tile, tile], fromRel: rel });   
    } else if (type === 'GANG') {
        let pongMeld = game.melds[pIdx].find(m => m.type === 'PONG' && m.tiles[0] === tile);
        
        // --- зІҫеҮҶдҝ®ж”№пјҡиЎҘжқ и§ҰеҸ‘жҠўжқ еҲӨе®ҡ ---
        if (pongMeld) {
            // и®°еҪ•еҪ“еүҚе°қиҜ•иЎҘжқ зҡ„дҝЎжҒҜпјҢз”ЁдәҺз»“з®—
            game.isQiangGangAttempt = { tile: tile, shooter: pIdx };
            
            // жЈҖжҹҘе…¶дҪҷдёүе®¶жҳҜеҗҰжңүдәәиғҪжҠўжқ 
            let qgRequests = [];
            for (let i = 0; i < 4; i++) {
                if (i === pIdx) continue;
                // ж ёеҝғи§„еҲҷпјҡжҠўжқ еҝ…йЎ»жҳҜеҗ¬иҝҷеј зүҢгҖӮйҖ»иҫ‘еҗҢеёёи§„иғЎеҲӨе®ҡпјҢдҪҶйңҖжҺ’йҷӨвҖңзҲҶеӨҙвҖқ
                // дҪҝз”Ёдёҙж—¶жүӢзүҢеҠ е…Ҙиҝҷеј жқ зүҢиҝӣиЎҢеҲӨе®ҡ
                let tempHand = [...game.hands[i], tile];
                let res = calculateYaku(tempHand, game.melds[i], false); 
                
                // еҲӨе®ҡпјҡиғҪиғЎ дё” дёҚжҳҜзҲҶеӨҙ (жҠўжқ дёҚж”ҜжҢҒзҲҶеӨҙ)
                if (res.total > 0 && !res.list.some(x => x.name.includes("иҙўзҘһеӨҙ"))) {
                    qgRequests.push(i);
                }
            }

            if (qgRequests.length > 0) {
                // и§ҰеҸ‘жҠўжқ иғЎпјҡеӨҡдәәеҸҜеҗҢж—¶иғЎпјҢжҢүйЎәеәҸжҲ–еҗҢж—¶еӨ„зҗҶ
                // иҝҷйҮҢз®ҖеҢ–еӨ„зҗҶпјҡзӣҙжҺҘи®©з¬¬дёҖдёӘиғҪиғЎзҡ„дәәиғЎпјҲжҲ–еҫӘзҺҜ handleWinпјү
                qgRequests.forEach(winIdx => {
                    game.isQiangGangEvent = true; // ж Үи®°еҪ“еүҚжҳҜжҠўжқ дәӢд»¶
                    handleWin(winIdx);
                });
                return; // дёӯж–ӯжқ зүҢжөҒзЁӢ
            }

            // ж— дәәжҠўжқ пјҢз»§з»ӯжү§иЎҢеҺҹиЎҘжқ йҖ»иҫ‘
            pongMeld.type = 'GANG'; pongMeld.tiles.push(tile);
            h.splice(h.indexOf(tile), 1);
        } else {
            // жҡ—жқ жҲ–еӨ§жҳҺжқ йҖ»иҫ‘дҝқжҢҒдёҚеҸҳ
            while(h.includes(tile)) h.splice(h.indexOf(tile), 1);
            game.melds[pIdx].push({ type: fromIdx===-1?'ANGANG':'GANG', tiles: [tile, tile, tile, tile], fromRel: rel });
            if (fromIdx !== -1) game.rivers[fromIdx].pop();
        }
        
        // и§ҰеҸ‘жқ зүҢпјҢиҝһз»ӯжқ зүҢж¬Ўж•°иҮӘеўһ
        game.consecutiveGangCount = (game.consecutiveGangCount || 0) + 1;
        game.isGangState = true; 
        game.isTrueDraw = false;
        render(); setTimeout(() => nextTurn(pIdx), 600); return;
    }else if (type === 'CHI') {
        // е…је®№еӨ„зҗҶпјҡзЎ®дҝқ decision.set еӯҳеңЁ
        let chiSet = (decision && decision.set) ? decision.set : null;
        if (!chiSet) {
            let sets = checkChiOptions(pIdx, tile);
            if (sets.length > 0) chiSet = sets[0];
        }
        
        if (chiSet) {
            chiSet.forEach(t => { 
                if(t !== tile) {
                    let hIdx = h.indexOf(t);
                    if(hIdx !== -1) h.splice(hIdx, 1);
                }
            });
            game.melds[pIdx].push({ type: 'CHI', tiles: [...chiSet].sort(), fromRel: rel });
        }
    }
	// --- ж ёеҝғдҝ®еӨҚпјҡеҗғзў°еҠЁдҪңеҗҺзҡ„е…ЁйҮҸжқ зүҢжЈҖжөӢдёҺеҮәзүҢжқғжҒўеӨҚ ---
    if (pIdx === 0 && type !== 'HU') {
        let h0 = game.hands[0];
        let canBuGangTile = null;
        for (let m of game.melds[0]) {
            if (m.type === 'PONG' && h0.includes(m.tiles[0])) {
                canBuGangTile = m.tiles[0]; break;
            }
        }
        let counts = {}; h0.forEach(x => { if(x !== game.bao) counts[x] = (counts[x] || 0) + 1; });
        let canAnGangTile = Object.keys(counts).find(k => counts[k] === 4);
        let targetGang = canBuGangTile || canAnGangTile;

        if (targetGang) {
            setTimeout(() => {
                showActions(['GANG'], targetGang, -1, (d) => {
                    if (d === 'GANG') {
                        handleAction('GANG', 0, targetGang, -1);
                    } else {
                        // е…ій”®дҝ®еӨҚпјҡзҺ©е®¶зӮ№вҖңиҝҮвҖқеҗҺпјҢеҝ…йЎ»йҮҚзҪ®зҠ¶жҖҒзЎ®дҝқеҸҜд»ҘеҮәзүҢ
                        game.turn = 0; sortHand(game.hands[0]); render();
                    }
                });
            }, 300);
            if (tile && fromIdx !== -1 && type !== 'GANG') game.rivers[fromIdx].pop();
            game.turn = 0; render(); // е…ҲжёІжҹ“дёҖж¬ЎпјҢи®©з•ҢйқўжҳҫзӨәеҲҡжүҚзў°/еҗғзҡ„зүҢ
            return; 
        }
    }
    if (tile && fromIdx !== -1 && type !== 'GANG') game.rivers[fromIdx].pop();
    game.turn = pIdx; sortHand(h); render();
    if(pIdx !== 0) setTimeout(() => aiPlay(pIdx), 500);
}

// --- д»…зІҫеҮҶжӣҝжҚў nextTurn еҮҪж•°дёӯзҡ„ AI еҶізӯ–йғЁеҲҶ ---

function nextTurn(pIdx) {
    game.turn = pIdx;
	// еҪ“иҪ®еҲ°и§ҰеҸ‘йЈҳиҙўзҡ„дәәеҶҚж¬Ўж‘ёзүҢж—¶пјҢи§Јй”Ғе…ЁеұҖеҠЁдҪң
    if (game.isActionLockedByPiao && pIdx === game.piaoTriggerIdx) {
        game.isActionLockedByPiao = false;
        game.piaoTriggerIdx = -1;
    }
    if(game.deck.length <= 20) { alert('иҚ’еә„'); init(); return; }
    let t = game.deck.pop(); game.hands[pIdx].push(t);
    game.isTrueDraw = (pIdx === 0); render();
    
    setTimeout(() => {
        const res = calculateYaku(game.hands[pIdx], game.melds[pIdx], game.isGangState);
        let acts = []; if(res.total > 0) acts.push('HU');
        
        let counts = {}; game.hands[pIdx].forEach(x => { if(x!==game.bao) counts[x]=(counts[x]||0)+1; });
        for(let k in counts) if(counts[k]===4) acts.push('GANG');
        let buGangTiles = game.hands[pIdx].filter(tile => tile !== game.bao && game.melds[pIdx].some(m => m.type === 'PONG' && m.tiles[0] === tile));
        if(buGangTiles.length > 0) acts.push('GANG');

        if(pIdx === 0) {
            if(acts.length > 0) showActions([...new Set(acts)], null, -1, (d) => {
                if(d==='HU') handleAction('HU', 0);
                else if(d==='GANG') {
                    let gTile = buGangTiles.length > 0 ? buGangTiles[0] : Object.keys(counts).find(k=>counts[k]===4);
                    handleAction('GANG', 0, gTile, -1);
                }
            });
        } else {
            let shouldHu = acts.includes('HU');
            
            if (shouldHu) {
                if (res.list.some(x => x.name.includes("иҙўзҘһеӨҙ"))) {
                    handleAction('HU', pIdx); return;
                }
                
                let bs = game.hands[pIdx].filter(x => x === game.bao).length;
                if (game.deck.length > 25 && bs >= 1) {
                    let tempHand = [...game.hands[pIdx]];
                    for (let i = 0; i < tempHand.length; i++) {
                        if (tempHand[i] === game.bao) continue;
                        let testHand = [...tempHand];
                        testHand.splice(i, 1); 
                        
                        let testBs = testHand.filter(x => x === game.bao).length;
                        let success = false;
                        
                        // AI е°қиҜ•зҷҪжқҝзҡ„еӨҡйҮҚеҸҜиғҪ
                        if (game.bao === '7z') {
                            let others = testHand.filter(x => x !== game.bao).sort();
                            if (canDiv(others, testBs - 1)) success = true;
                        } else {
                            let baseOthers = testHand.filter(x => x !== game.bao && x !== '7z');
                            let count7z = testHand.filter(x => x === '7z').length;
                            for (let handBaoCount = 0; handBaoCount <= count7z; handBaoCount++) {
                                let currentOthers = [...baseOthers];
                                for(let j=0; j<handBaoCount; j++) currentOthers.push(game.bao);
                                for(let j=0; j<(count7z - handBaoCount); j++) currentOthers.push('7z');
                                currentOthers.sort();
                                if (canDiv(currentOthers, testBs - 1)) { success = true; break; }
                            }
                        }

                        if (success) {
                            console.log(`AIж”ҫејғиҮӘж‘ёпјҢж”№еҗ¬зҲҶеӨҙпјҢеҲҮжҺү: ${tempHand[i]}`);
                            game.hands[pIdx].splice(i, 1);
                            let discTile = tempHand[i];
                            game.rivers[pIdx].push(discTile); game.lastPlayer = pIdx; game.lastTile = discTile;
                            sortHand(game.hands[pIdx]); render();
                            setTimeout(() => processDiscards(discTile, pIdx), 400);
                            return; 
                        }
                    }
                }
                handleAction('HU', pIdx); 
            } else if(acts.includes('GANG')) {
                let gTile = buGangTiles.length > 0 ? buGangTiles[0] : Object.keys(counts).find(k=>counts[k]===4);
                handleAction('GANG', pIdx, gTile, -1);
            } else {
                game.isGangState = false; 
				game.consecutiveGangCount = 0; // AIжІЎжңүйҖүжӢ©з»§з»ӯжқ пјҢйҮҚзҪ®
				aiPlay(pIdx);
            }
        }
    }, 600);
}

// --- дҝ®ж”№ aiPlay еҮҪж•° (AIд№ҹиҰҒж”ҜжҢҒйЈҳиҙўйҖ»иҫ‘) ---
function aiPlay(pIdx) {
    let h = game.hands[pIdx];
    // AIз®ҖеҚ•йҖ»иҫ‘пјҡеҰӮжһңжңүдёӨдёӘиҙўзҘһдё”е·Іеҗ¬зүҢпјҢйҡҸжңәжү“еҮәдёҖеј иҙўзҘһиҝӣе…ҘйЈҳиҙў
    let baoIdx = h.indexOf(game.bao);
    if (baoIdx !== -1) {
        const checkRes = calculateYaku(h, game.melds[pIdx], game.isGangState);
        if (checkRes.total > 0 && checkRes.list.some(x => x.name.includes("иҙўзҘһеӨҙ"))) {
            // AI еҶіе®ҡйЈҳиҙў
            let t = h.splice(baoIdx, 1)[0];
            game.piaoCounts[pIdx]++;
            game.rivers[pIdx].push(t); game.lastPlayer = pIdx; game.lastTile = t;
            sortHand(h); render();
            setTimeout(() => processDiscards(t, pIdx), 400);
            return;
        }
    }
    
    // еҺҹжңүеёёи§„еҮәзүҢйҖ»иҫ‘...
    let playable = h.map((t,i) => t !== game.bao ? i : null).filter(x => x !== null);
    let idx = playable.length > 0 ? playable[Math.floor(Math.random()*playable.length)] : 0;
    let t = h.splice(idx, 1)[0];
    // AI еҮәзүҢж—¶зҡ„еҲӨе®ҡ
    if (t === game.bao) {
        // еҰӮжһңAIз¬ҰеҗҲйЈҳиҙўйҖ»иҫ‘пјҲжӯӨеӨ„з®ҖеҢ–пјҢд»…еҲӨж–ӯжү“еҮәзҡ„жҳҜеҗҰжҳҜиҙўзҘһпјү
        game.isActionLockedByPiao = true;
        // еҰӮжһңиҰҒAIд№ҹзІҫз»ҶеҲӨж–ӯйЈҳиҙўз•ӘеһӢпјҢйңҖеңЁжӯӨи°ғз”Ё calculateYaku
    } else {
        game.piaoCounts[pIdx] = 0;
        game.isActionLockedByPiao = false;
    }
    game.rivers[pIdx].push(t); game.lastPlayer = pIdx; game.lastTile = t;
    sortHand(h); render();
    setTimeout(() => processDiscards(t, pIdx), 400);
}

// ---------------- еҲӨе®ҡж ёеҝғ ----------------

function calculateYaku(hand, melds, isGang) {
	// --- ж–°еўһпјҡеҠЁжҖҒи®Ўз®—ж ҮеҮҶиғЎзүҢеј ж•° ---
    const gangCount = melds.filter(m => m.type === 'GANG' || m.type === 'ANGANG').length;
    const targetTotal = 14 + gangCount;
	
	// 1. еӨ©иғЎеҲӨе®ҡпјҡеҝ…йЎ»жҳҜиө·жүӢ14еј зүҢпјҲжІЎжңүеүҜйңІпјүпјҢдё”жҳҜжёёжҲҸз¬¬дёҖиҪ®ж‘ёзүҢйҳ¶ж®ө
    // еҲӨж–ӯж ҮеҮҶпјҡеүҜйңІдёәз©ә дё” жүӢзүҢдёә14еј  дё” иҝҳжІЎеҮәиҝҮзүҢпјҲеҸҜд»ҘйҖҡиҝҮ deck й•ҝеәҰжҲ–з®ҖеҚ•зҡ„ж Үи®°еҲӨж–ӯпјү
    // еңЁдҪ зҡ„д»Јз Ғжһ¶жһ„дёӯпјҢinit еҗҺз¬¬дёҖж¬Ў call calculateYaku дё”жүӢзүҢдёә14еҚідёәеӨ©иғЎ
    if (melds.length === 0 && hand.length === targetTotal && game.rivers.every(r => r.length === 0)) {
        // ж ЎйӘҢжҳҜеҗҰзңҹзҡ„иҫҫжҲҗдәҶиғЎзүҢеҹәжң¬жқЎд»¶пјҲйҳІжӯўжІЎиғЎзӮ№иғЎпјү
        // иҝҷйҮҢи°ғз”ЁдёҖдёӘеҹәзЎҖзҡ„иғЎзүҢж ЎйӘҢпјҢеҰӮжһңиғҪиғЎпјҢзӣҙжҺҘз»ҷеӨ©иғЎз•ӘеһӢ
        let bs = hand.filter(x => x === game.bao).length;
        let others = hand.filter(x => x !== game.bao).sort();
        
        // з®ҖеҚ•еӨҚз”ЁзҺ°жңүзҡ„еҹәзЎҖж ЎйӘҢйҖ»иҫ‘пјҢеҰӮжһңиғҪиғЎеҲҷи§ҰеҸ‘еӨ©иғЎ
        if (checkBasicHu(others, bs, targetTotal)) {
            return {
                total: 4, // еҹәзЎҖз•Әж•°еҒҮи®ҫдёә1пјҢеӨ©иғЎx4пјҲжҲ–иҖ…ж №жҚ®дҪ зҡ„еҹәж•°иҮӘж‘ё2x2=4пјҢиҝҷйҮҢзӣҙжҺҘз»ҷжҖ»з•Әж•°з»“жһңпјү
                list: [{name: "еӨ©иғЎ", mul: 4}]
            };
        }
    }
	
	// --- ж–°еўһпјҡеҢ…дёҺеҸҚеҢ…еҲӨе®ҡйҖ»иҫ‘ ---
    let baoType = null;
    let pIdx = game.winner !== -1 ? game.winner : game.turn; // еҪ“еүҚиғЎзүҢдәә
    
    // з»ҹи®ЎеҪ“еүҚиғЎзүҢдәәеүҜйңІдёӯеҗ„е®¶зҡ„ж¬Ўж•° (fromRel: 0дёӢе®¶, 1еҜ№е®¶, 2дёҠе®¶)
    let counts = {0:0, 1:0, 2:0};
    melds.forEach(m => {
        if (m.fromRel !== -1) counts[m.fromRel]++;
    });
	
	// еҲӨе®ҡпјҡжҳҜеҗҰжңүд»»дҪ•дёҖе®¶иў«иғЎзүҢдәәеҗғзў°жқ дәҶ3ж¬ЎеҸҠд»ҘдёҠ
    let isBaoTargetIdx = Object.keys(counts).find(key => counts[key] >= 3);
    if (isBaoTargetIdx !== undefined) {
        baoType = "еҢ…"; // иғЎзүҢдәәеҢ…дәҶеҲ«дәә
    }
	
	// еҲӨе®ҡпјҡеҸҚеҢ… (жЈҖжҹҘдёүе®¶еҜ№жүӢзҡ„еүҜйңІйҮҢпјҢжҳҜеҗҰжңүдәәеҢ…дәҶеҪ“еүҚзҡ„иғЎзүҢдәә)
    // йҖ»иҫ‘пјҡеҰӮжһңжҹҗдәәзҡ„еүҜйңІжқҘжәҗжҢҮеҗ‘еҪ“еүҚиғЎзүҢдәәдё”ж¬Ўж•°>=3
    for (let i = 0; i < 4; i++) {
        if (i === pIdx) continue;
        let otherCounts = {0:0, 1:0, 2:0};
        game.melds[i].forEach(m => {
            if (m.fromRel !== -1) {
                // и®Ўз®—иҜҘеүҜйңІзӣёеҜ№дәҺзҺ©е®¶ i зҡ„жқҘжәҗеңЁе…ЁеұҖжҳҜи°Ғ
                let sourceIdx = (i + [3, 2, 1][m.fromRel]) % 4; 
                if (sourceIdx === pIdx) otherCounts[m.fromRel]++;
            }
        });
        if (Object.values(otherCounts).some(c => c >= 3)) {
            baoType = "еҸҚеҢ…";
            break;
        }
    }
	
	
    // еҰӮжһңиҙўзҘһеҲҡеҘҪе°ұжҳҜзҷҪжқҝпјҢдёҚйңҖиҰҒеҸҢйҮҚиә«д»ҪпјҢзӣҙжҺҘиө°еҺҹе§ӢйҖ»иҫ‘
    if (game.bao === '7z') {
        let bs = hand.filter(x => x === game.bao).length;
        let others = hand.filter(x => x !== game.bao).sort();
		return calculateYakuCore(others, bs, melds, isGang, hand.length, baoType, targetTotal);
    }

    let baseOthers = hand.filter(x => x !== game.bao && x !== '7z');
    let bs = hand.filter(x => x === game.bao).length;
    let count7z = hand.filter(x => x === '7z').length;

    // жүҫеҮәеҢ…еҗ«дәҶзҷҪжқҝзҡ„еүҜйңІпјҲзў°/жқ пјү
    let melds7zIndices = [];
    melds.forEach((m, idx) => { if (m.tiles[0] === '7z') melds7zIndices.push(idx); });

    let bestResult = { total: 0, list: [] };

    // з©·дёҫжүӢзүҢдёӯзҷҪжқҝзҡ„жүҖжңүиә«д»Ҫз»„еҗҲ
    for (let handBaoCount = 0; handBaoCount <= count7z; handBaoCount++) {
        let hand7zCount = count7z - handBaoCount;
        let currentOthers = [...baseOthers];
        for(let i=0; i<handBaoCount; i++) currentOthers.push(game.bao); // еҪ“дҪңиҙўзҘһеҺҹзүҢ
        for(let i=0; i<hand7zCount; i++) currentOthers.push('7z');      // дҝқжҢҒзҷҪжқҝ
        currentOthers.sort();

        // з©·дёҫеүҜйңІдёӯзҷҪжқҝзҡ„жүҖжңүиә«д»Ҫз»„еҗҲ (0 еҲ° 2^N)
        let meldCombos = 1 << melds7zIndices.length;
        for (let mask = 0; mask < meldCombos; mask++) {
            let currentMelds = melds.map((m, idx) => {
                if (melds7zIndices.includes(idx) && (mask & (1 << melds7zIndices.indexOf(idx)))) {
                    return { ...m, tiles: m.tiles.map(() => game.bao) }; // еүҜйңІеҪ“дҪңиҙўзҘһеҺҹзүҢ
                }
                return m;
            });

            // й’ҲеҜ№иҝҷдёҖз§Қз»„еҗҲпјҢеҺ»з®—з•Ә  
			let res = calculateYakuCore(currentOthers, bs, currentMelds, isGang, hand.length, baoType, targetTotal);
			// и®°еҪ•з•Әж•°жңҖеӨ§зҡ„жү“жі•
            if (res.total > bestResult.total) bestResult = res;
        }
    }
    return bestResult;
}

// еүҘзҰ»еҮәзҡ„зәҜеҮҖзүҲиғЎзүҢж ёеҝғиҝҗз®—
function calculateYakuCore(others, bs, melds, isGang, handLength, baoType, targetTotal) {
    let yakus = [{name: "иҮӘж‘ё", base: 2}];
    let canHu = false, isBaoTou = false;
    let isDanDiao = (handLength === 2); 
	
	//жЈҖжҹҘдёғеҜ№
    let sevenRes = (handLength === targetTotal) ? checkSevenPairs(others, bs, targetTotal) : {success:false};
    
    if (sevenRes.success) {
        canHu = true; yakus.push({name: "дёғеҜ№", mul: 2}); 
        if (sevenRes.isBao) isBaoTou = true;
    } else {
		// жЈҖжҹҘдёҚжҗӯ
        let buda = null;
		if (melds.length === 0) {
			// жһ„е»әдёҖдёӘвҖңйҖ»иҫ‘е…ЁжүӢзүҢвҖқпјҡйқһиҙўзҘһзүҢ(others) + зңҹжӯЈзҡ„иҙўзҘһ
			// иҝҷйҮҢзҡ„ game.bao жҳҜе…ЁеұҖеҸҳйҮҸпјҢд»ЈиЎЁеҪ“еүҚзҡ„иҙўзҘһ
			let checkArr = [...others];
			for(let i=0; i<bs; i++) checkArr.push(game.bao);

			const rawCounts = {};
			checkArr.forEach(t => rawCounts[t] = (rawCounts[t] || 0) + 1); 
			
			// ж ёеҝғжӢҰжҲӘпјҡйҷӨдәҶзңҹжӯЈзҡ„иҙўзҘһ(game.bao)еӨ–пјҢжҳҜеҗҰжңүд»»дҪ•зүҢеҮәзҺ°дәҶдёӨж¬Ў
			const realDup = Object.keys(rawCounts).some(k => k !== game.bao && rawCounts[k] > 1);
			
			if (!realDup) {
				buda = checkBuDa(others, bs, game.bao, targetTotal);
			}
		}
        if(buda) { 
            canHu = true; yakus.push(buda); 
        } else {
            // 1. дјҳе…ҲеҲӨе®ҡвҖңеӨҡиҙўзҘһзҲҶеӨҙвҖқпјҲеҸҢиҙўзҘһжҲ–дёүиҙўзҘһзҲҶеӨҙпјү
            // еҰӮжһңжүӢйҮҢжңүдёӨдёӘеҸҠд»ҘдёҠиҙўзҘһпјҢдё”жӢҝиө°дёӨдёӘиҙўзҘһеҒҡе°ҶеҗҺпјҢеү©дёӢзҡ„зүҢиғҪе®ҢзҫҺз»„жҲҗйқўеӯҗ
            if (bs >= 2 && canDiv(others, bs - 2)) {
                canHu = true;
                isBaoTou = true;
            }

            // 2. еҲӨе®ҡеҚ•иҙўзҘһзҲҶеӨҙпјҡ12еј зүҢе·ІжҲҗеһӢпјҢеү©дёӢдёҖеј еҚ•еј еәҹзүҢ + дёҖеј иҙўзҘһзҲҶеӨҙ
            if (!isBaoTou && bs >= 1) {
                for (let t of [...new Set(others)]) {
                    let temp = [...others];
                    temp.splice(temp.indexOf(t), 1); 
                    if (canDiv(temp, bs - 1)) {
                        canHu = true;
                        isBaoTou = true;
                        break;
                    }
                }
            }

            // 3. еҲӨе®ҡжҷ®йҖҡиғЎпјҲйқһзҲҶеӨҙпјүпјҡеҜ»жүҫе°ҶзүҢпјҲд»…еңЁжңӘи§ҰеҸ‘зҲҶеӨҙж—¶дҪңдёәе…ңеә•жҲ–еёёи§„еҲӨе®ҡпјү
            if (!isBaoTou) {
                for (let t of [...new Set(others)]) {
                    let temp = [...others];
                    if (temp.filter(x => x === t).length >= 2) {
                        let tempArr = [...temp];
                        tempArr.splice(tempArr.indexOf(t), 2); 
                        if (canDiv(tempArr, bs)) { 
                            canHu = true; 
                        }
                    }
                }
            }
        }
    }
	
	// еҰӮжһңжҳҜе…Ёеӯ—зүҢпјҢиҷҪз„¶жҷ®йҖҡйқўеӯҗжӢҶи§ЈдёҚиҝҮеҺ»пјҢдҪҶдҫқз„¶йңҖиҰҒе…Ғи®ёе…¶йҖҡиҝҮеӯ—дёҖиүІиғЎзүҢ
    let allTiles = [...others]; 
    melds.forEach(m => allTiles.push(...m.tiles));
    const isAllHonor = allTiles.every(t => typeof t === 'string' && t.endsWith('z'));
    if (isAllHonor) {
        canHu = true;
    }
	
	// еҰӮжһңжңҖз»ҲжІЎиғҪиҫҫжҲҗд»»дҪ•иғЎзүҢжқЎд»¶пјҢиҝ”еӣһ0
    if(!canHu) return {total: 0};
    
    if (baoType === "еҢ…") yakus.push({name: "еҢ…", base: 0});
    else if (baoType === "еҸҚеҢ…") yakus.push({name: "еҸҚеҢ…", base: 0});
    if (game.isQiangGangEvent) yakus.push({name: "жҠўжқ ", base: 0});

    let pIdx = game.winner !== -1 ? game.winner : game.turn;
    let piao = game.piaoCounts[pIdx];
    if (piao === 1) yakus.push({name: "йЈҳиҙў", mul: 2});
    else if (piao >= 2) yakus.push({name: "еҸҢйЈҳ", mul: 4});

    if(isBaoTou) yakus.push({name: "иҙўзҘһеӨҙ", mul: 2});
    if(isDanDiao) yakus.push({name: "еҚ•еҗҠ", mul: 2});
    if(isGang) {
        yakus.push({name: "жқ ејҖ", mul: 2});
        // --- ж–°еўһпјҡеҰӮжһңжҳҜеңЁиҝһз»ӯжқ зүҢ2ж¬ЎеҸҠд»ҘдёҠж—¶иғЎзүҢпјҢиҝҪеҠ еҸҢиҝһжқ з•ӘеһӢ ---
        if (game.consecutiveGangCount >= 2) {
            yakus.push({name: "еҸҢиҝһжқ ", mul: 2});
        }
    }
    
    let colorYaku = checkColors(others, melds);
    if(colorYaku) yakus.push(colorYaku);
    if(checkDuiDuiHu(others, bs, melds)) yakus.push({name: "еӣӣеӨ§зў°", mul: 2});
    if(bs >= 3) yakus.push({name: "дёүиҙўзҘһ", mul: 2});

    let total = yakus[0].base;
    for(let i = 1; i < yakus.length; i++) if(yakus[i].mul) total *= yakus[i].mul;
    return {list: yakus, total: total};
}

// --- еңЁи„ҡжң¬дёӯжүҫдёӘдҪҚзҪ®ж·»еҠ иҝҷдёӘз®ҖеҚ•ж ЎйӘҢеҮҪж•° ---
function checkBasicHu(others, bs, targetTotal) {
    // жЈҖжҹҘдёғеҜ№
    if (others.length + bs === targetTotal) {
        let c = {}; others.forEach(t => c[t] = (c[t]||0)+1);
        let singleTiles = 0;
        for(let t in c) if(c[t] % 2 !== 0) singleTiles++;
        if (singleTiles <= bs) return true;
    }
    // жЈҖжҹҘдёҚжҗӯ
    if (checkBuDa(others, bs, game.bao,targetTotal)) return true;
    // жЈҖжҹҘеёёи§„иғЎпјҲеёҰе°Ҷпјү
    for (let t of [...new Set(others)]) {
        let temp = [...others];
        if (temp.filter(x => x === t).length >= 2) {
            temp.splice(temp.indexOf(t), 2);
            if (canDiv(temp, bs)) return true;
        }
    }
    if (bs >= 1) {
        for (let t of [...new Set(others)]) {
            let temp = [...others];
            temp.splice(temp.indexOf(t), 1);
            if (canDiv(temp, bs - 1)) return true;
        }
    }
    if (bs >= 2 && canDiv(others, bs - 2)) return true;
    
    return false;
}

function canDiv(ts, bs) {
    if(ts.length === 0) return bs % 3 === 0;
    let t = ts[0], v = parseInt(t[0]), ty = t[1], count = ts.filter(x => x === t).length;
    for(let i=0; i<=Math.min(bs, 2); i++) {
        if(count + i >= 3) {
            let next = [...ts]; for(let j=0; j<(3-i); j++) next.splice(next.indexOf(t), 1);
            if(canDiv(next, bs - i)) return true;
        }
    }
    if(ty !== 'z' && v <= 9) {
        for (let bUsed=0; bUsed<=2; bUsed++) {
            if (bUsed > bs) continue;
            let tempNext = [...ts]; tempNext.splice(tempNext.indexOf(t), 1);
            let t1 = (v+1)+ty, t2 = (v+2)+ty, currentB = bs, success = true;
            [t1, t2].forEach(target => {
                if (parseInt(target[0]) > 9) { success = false; return; }
                let idx = tempNext.indexOf(target);
                if (idx !== -1) tempNext.splice(idx, 1);
                else if (currentB > 0) currentB--;
                else success = false;
            });
            if (success && (bs - currentB) === bUsed) { if (canDiv(tempNext, currentB)) return true; }
        }
    }
    return false;
}

function checkBuDa(others, bs, bao, targetTotal) {
    // others: еүҘзҰ»дәҶиҙўзҘһеҗҺзҡ„жүӢзүҢж•°з»„
    // bs: иҙўзҘһпјҲе®қзүҢпјүзҡ„ж•°йҮҸ
    // bao: иҙўзҘһзҡ„зүҢеҖјпјҲеҰӮ '4z'пјү
    // targetTotal: йңҖиҰҒиҫҫеҲ°зҡ„жҖ»зүҢж•°пјҲйҖҡеёё14пјү

    let counts = {};
    let m = [], s = [], p = [], z = [];
    
    // 1. дёҘж јжЈҖжҹҘйқһиҙўзҘһзүҢзҡ„йҮҚеӨҚжғ…еҶө
    for (let t of others) {
        counts[t] = (counts[t] || 0) + 1;
        // е…ій”®зӮ№пјҡеҰӮжһңиҝҷзүҢдёҚжҳҜиҙўзҘһпјҢдҪҶж•°йҮҸеӨ§дәҺ1пјҢз»қеҜ№дёҚиғҪиғЎдёҚжҗӯ
        if (counts[t] > 1 && t !== bao) return null;

        let v = parseInt(t[0]), type = t[1];
        if (type === 'm') m.push(v);
        else if (type === 's') s.push(v);
        else if (type === 'p') p.push(v);
        else if (type === 'z') z.push(v);
    }

    // 2. жЈҖжҹҘеәҸж•°зүҢ(дёҮжқЎзӯ’)зҡ„еҶІзӘҒпјҡеҗҢиҠұиүІеҝ…йЎ»й—ҙйҡ” >= 3
    const hasConflict = (arr) => {
        arr.sort((a, b) => a - b);
        for (let i = 0; i < arr.length - 1; i++) {
            if (arr[i+1] - arr[i] < 3) return true; // жҜ”еҰӮ 1,2 жҲ– 1,3
        }
        return false;
    };
    if (hasConflict(m) || hasConflict(s) || hasConflict(p)) return null;

    // 3. и®Ўз®—йҖ»иҫ‘зјәеҸЈпјҡ
    // дёҮжқЎзӯ’жҜҸдёӘиҠұиүІжңҖеӨҡж”ҫ3еј зүҢ(147/258/369)пјҢе…ұ9дёӘеқ‘
    // еӯ—зүҢжңҖеӨҡ7з§Қ(дёңеҚ—иҘҝеҢ—дёӯеҸ‘зҷҪ)пјҢе…ұ7дёӘеқ‘
    // жҖ»еқ‘дҪҚ 16 дёӘгҖӮдёҚжҗӯиғЎзүҢе°ұжҳҜ 14 еј зүҢеЎ«иҝӣиҝҷ 16 дёӘеқ‘дё”дёҚеҮҶжңүйҮҚеӨҚгҖӮ

    // и®Ўз®—еәҸж•°зүҢеҚ дәҶеӨҡе°‘дёӘеқ‘пјҢе№¶и®Ўз®—иҠұиүІеәҸеҲ—пјҲжӯЈи§„дёҚжҗӯз”Ёпјү
    let isZG = true;
    [m, s, p].forEach(arr => {
        if (arr.length > 1) {
            let line = arr[0] % 3;
            if (!arr.every(v => v % 3 === line)) isZG = false;
        }
    });

    // 4. еӨ„зҗҶйҮҚеӨҚеӯ—е’ҢиҙўзҘһзҡ„е…ізі»
    // дҪ зҡ„жЎҲдҫӢпјҡж‘ёеҲ°зҷҪжқҝжҸҗзӨәиғЎпјҢжҳҜеӣ дёәйҖ»иҫ‘жІЎеҸ‘зҺ°зҷҪжқҝйҮҚеӨҚдәҶгҖӮ
    // жҲ‘д»¬еҶҚж¬ЎејәеҲ¶ж ЎйӘҢпјҡйҷӨдәҶиҙўзҘһзүҢжң¬иә«пјҢе…¶д»–жүҖжңүзүҢзҡ„ count еҝ…йЎ»дёә 1гҖӮ
    // еҚідҪҝиҙўзҘһжҳҜеҚ—пјҢдҪ жңү3дёӘеҚ—пјҢйӮЈжҳҜе…Ғи®ёзҡ„пјӣдҪҶзҷҪжқҝдёҚжҳҜиҙўзҘһпјҢдҪ жңү2дёӘзҷҪжқҝе°ұеҝ…жӯ»гҖӮ
    let duplicateNonBao = false;
    Object.keys(counts).forEach(key => {
        if (key !== bao && counts[key] > 1) duplicateNonBao = true;
    });
    if (duplicateNonBao) return null;

    // 5. еҲӨе®ҡдёғйЈҺ
    let ziTypes = new Set(z);
    if (bao[1] === 'z') ziTypes.add(parseInt(bao[0]));

    if (ziTypes.size >= 7) {
        return isZG ? {name: "жӯЈи§„дёғйЈҺдёҚжҗӯ", mul: 8} : {name: "дёғйЈҺдёҚжҗӯ", mul: 4};
    }
    
    // жҷ®йҖҡдёҚжҗӯ
    return isZG ? {name: "жӯЈи§„дёҚжҗӯ", mul: 4} : {name: "дёҚжҗӯ", mul: 2};
}

// --- 1. зІҫеҮҶжӣҝжҚў checkSevenPairs еҮҪж•° (еўһеҠ иҙўзҘһеӨҙеҲӨе®ҡж”ҜжҢҒ) ---
function checkSevenPairs(others, bs, targetTotal) {
    // еҸӘжңүеңЁжІЎжңүд»»дҪ•жқ зҡ„жғ…еҶөдёӢпјҲtargetTotal === 14пјүпјҢжүҚе…Ғи®ёиғЎдёғеҜ№
    if (targetTotal !== 14) return { success: false, isBao: false };
    
    let c = {}; 
    others.forEach(t => c[t] = (c[t]||0)+1);
    
    let singleTiles = 0;
    for(let t in c) {
        if(c[t] % 2 !== 0) singleTiles++;
    }
    
    // еҹәзЎҖеҲӨе®ҡпјҡеҚ•еј зҡ„ж•°йҮҸеҝ…йЎ»е°ҸдәҺзӯүдәҺиҙўзҘһж•°йҮҸпјҢжүҚиғҪеҮ‘жҲҗдёғеҜ№
    let success = (singleTiles <= bs);
    let isBao = false;

    if (success) {
        // --- дҝ®жӯЈйҖ»иҫ‘ ---
        // еҲӨе®ҡиҙўзҘһеӨҙпјҲзҲҶеӨҙпјүпјҡ
        // еҰӮжһңиҙўзҘһж•°йҮҸ > 0пјҢдё”жүЈйҷӨдёҖдёӘиҙўзҘһеҗҺпјҢеү©дёӢзҡ„зүҢдҫқз„¶иғҪеҮ‘жҲҗдёғеҜ№пјҲеҚіеҚ•еј ж•° <= еү©дҪҷиҙўзҘһж•°пјү
        // иҝҷж„Ҹе‘ізқҖжңҖеҗҺдёҖдёӘиҙўзҘһжҳҜвҖңеӨҡеҮәжқҘвҖқзҡ„пјҢеҪўжҲҗдәҶ 12(жҲҗеһӢ) + 1(еҚ•еј ) + 1(иҙўзҘһ) зҡ„зҲҶеӨҙз»“жһ„
        if (bs > singleTiles && bs > 0) {
            isBao = true;
        }
    }
    
    return { success: success, isBao: isBao };
}

function checkDuiDuiHu(others, bs, melds) {
    if(melds.some(m => m.type === 'CHI')) return false;
    function onlyKezis(ts, b) {
        if(ts.length === 0) return b % 3 === 0;
        let t = ts[0], count = ts.filter(x => x === t).length;
        for(let i=0; i<=Math.min(b, 2); i++) {
            if(count + i >= 3) {
                let next = [...ts]; for(let j=0; j<(3-i); j++) next.splice(next.indexOf(t), 1);
                if(onlyKezis(next, b - i)) return true;
            }
        }
        return false;
    }
    for (let t of [...new Set(others)]) {
        let temp = [...others];
        if (temp.filter(x => x === t).length >= 2) {
            temp.splice(temp.indexOf(t), 2);
            if (onlyKezis(temp, bs)) return true;
        }
    }
    if (bs >= 1) {
        for (let t of [...new Set(others)]) {
            let temp = [...others]; temp.splice(temp.indexOf(t), 1);
            if (onlyKezis(temp, bs - 1)) return true;
        }
        if (bs >= 2 && onlyKezis(others, bs - 2)) return true;
    }
    return false;
}

function checkColors(others, melds) {
    let normalTiles = [...others];
    melds.forEach(m => normalTiles.push(...m.tiles));
    
    let types = new Set(normalTiles.map(t => t[1]));
    let hasZi = types.has('z'); 
    types.delete('z'); // з§»йҷӨеӯ—зүҢпјҢеҸӘдҝқз•ҷдёҮ(m)гҖҒжқЎ(s)гҖҒзӯ’(p)
    
    // ж ёеҝғдҝ®жӯЈпјҡеҰӮжһңз§»йҷӨеӯ—зүҢеҗҺжІЎжңүд»»дҪ•еәҸж•°зүҢпјҢиҜҙжҳҺж•ҙжүӢзүҢе…ЁжҳҜеӯ—зүҢпјҢи§ҰеҸ‘жңҖй«ҳзә§вҖңеӯ—дёҖиүІ 16з•ӘвҖқпјҢдё”з»қеҜ№дёҚиҝ”еӣһжё…дёҖиүІ
    if (types.size === 0) {
        return {name: "еӯ—дёҖиүІ", mul: 16};
    }
    
    // жё…дёҖиүІпјҡжүӢзүҢйҮҢеҸӘжңүдёҖз§ҚеәҸж•°зүҢпјҢдё”з»қеҜ№жІЎжңүеӯ—зүҢ
    if (types.size === 1 && !hasZi) return {name: "жё…дёҖиүІ", mul: 4};
    
    // ж··дёҖиүІпјҡжүӢзүҢйҮҢеҸӘжңүдёҖз§ҚеәҸж•°зүҢпјҢдё”еҝ…йЎ»еҢ…еҗ«еӯ—зүҢ
    if (types.size === 1 && hasZi) return {name: "ж··дёҖиүІ", mul: 2};
    
    return null;
}

function checkChiOptions(pIdx, t) {
    if(!t || t[1]==='z' || t===game.bao) return [];
    let v=parseInt(t[0]), s=t[1], h=game.hands[pIdx], res=[];
    let has = (n) => h.includes(n+s) && (n+s)!==game.bao;
    if(has(v-2) && has(v-1)) res.push([(v-2)+s, (v-1)+s, t]);
    if(has(v-1) && has(v+1)) res.push([(v-1)+s, t, (v+1)+s]);
    if(has(v+1) && has(v+2)) res.push([t, (v+1)+s, (v+2)+s]);
    return res;
}

function handleWin(pIdx) {
    game.winner = pIdx; 
	// еҰӮжһңжҳҜжҠўжқ иғЎпјҢжҠҠиў«жҠўзҡ„йӮЈеј зүҢдёҙж—¶еЎһиҝӣиөўе®¶жүӢзүҢд»ҘдҫҝжёІжҹ“е’Ңи®Ўз®—
    if (game.isQiangGangEvent && game.isQiangGangAttempt) {
        game.hands[pIdx].push(game.isQiangGangAttempt.tile);
    }
	render(true);
    const res = calculateYaku(game.hands[pIdx], game.melds[pIdx], game.isGangState);
    document.getElementById('res-title').innerText = (pIdx===0?"зҺ©е®¶":"AI") + (res.list.some(x=>x.name.includes("иҙўзҘһеӨҙ"))?" иҙўзҘһеӨҙ!!":" иғЎзүҢ");
    const mEl = document.getElementById('res-melds'); mEl.innerHTML = '';
    game.melds[pIdx].forEach(m => mEl.appendChild(createMeldGroup(m, true)));
    const hEl = document.getElementById('res-hand'); hEl.innerHTML = '';
    game.hands[pIdx].forEach(t => hEl.appendChild(createTileDOM(t, false, t===game.bao, false)));
    const lEl = document.getElementById('res-yaku-list'); lEl.innerHTML = '';
    res.list.forEach(x => { 
        let span = document.createElement('span');
        span.innerText = x.mul ? `${x.name} x${x.mul}` : `${x.name} ${x.base}з•Ә`;
        lEl.appendChild(span);
    });
    document.getElementById('res-total').innerText = res.total;
    document.getElementById('result-screen').style.display = 'flex';
}

function init() {
    document.getElementById('result-screen').style.display = 'none';
    let all = []; 
    ['m','s','p'].forEach(s => {for(let n=1;n<=9;n++) for(let i=0;i<4;i++) all.push(n+s)}); 
    for(let n=1;n<=7;n++) for(let i=0;i<4;i++) all.push(n+'z');

    // --- дҝ®еӨҚпјҡдҪҝз”Ёжӣҙе…¬е№ізҡ„жҙ—зүҢз®—жі• ---
    for (let i = all.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [all[i], all[j]] = [all[j], all[i]];
    }
    game = { 
        deck: all, 
        hands:[[],[],[],[]], 
        melds:[[],[],[],[]], 
        rivers:[[],[],[],[]], 
        turn:0, 
        winner:-1, 
        lastPlayer:-1, 
        lastTile:null, 
        isGangState:false,
        // --- ж–°еўһпјҡйЈҳиҙўзӣёе…ізҠ¶жҖҒ ---
        piaoCounts: [0, 0, 0, 0],       // и®°еҪ•жҜҸдёӘзҺ©е®¶иҝһйЈҳж¬Ўж•°
        isActionLockedByPiao: false,    // е…ЁеұҖй”Ғе®ҡпјҡдёүе®¶дёҚиғҪеҗғзў°жқ 
		piaoTriggerIdx: -1,
        // --- ж–°еўһйҮҚзҪ® ---
        isQiangGangEvent: false,
        isQiangGangAttempt: null,
		// --- ж–°еўһпјҡиҝһз»ӯжқ зүҢи®Ўж•°еҷЁ ---
        consecutiveGangCount: 0
    };
    game.bao = game.deck.pop(); 
    document.getElementById('bao-display').innerText = ICONS[game.bao[1]][parseInt(game.bao[0])-1];
    for(let i=0; i<4; i++) { game.hands[i] = game.deck.splice(0,13); sortHand(game.hands[i]); }
    render(); nextTurn(0);
}
window.onload = init;
</script>
